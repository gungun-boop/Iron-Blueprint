<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Iron Blueprint | Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: black; color: white; -webkit-tap-highlight-color: transparent; }
        .glass-card { background: rgba(30, 41, 59, 0.4); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); }
        .input-focus-effect:focus { border-bottom: 2px solid #3b82f6; outline: none; }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Simple Icon Component
        const Icon = ({ name, size = 20, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current && window.lucide) {
                    iconRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    window.lucide.createIcons({
                        root: iconRef.current,
                        attrs: { width: size, height: size, class: className }
                    });
                }
            }, [name, size, className]);
            return <span ref={iconRef} className="inline-flex"></span>;
        };

        const STORAGE_KEY = 'iron_blueprint_v8_stable';

        function App() {
            const [view, setView] = useState('loading');
            const [onboardingStep, setOnboardingStep] = useState(1);
            const [isGenerating, setIsGenerating] = useState(false);
            const [errorMsg, setErrorMsg] = useState(null);
            const [recovery, setRecovery] = useState(80); // 0 to 100

            // Profile & 1RM State
            const [profile, setProfile] = useState({
                userApiKey: "",
                aiModel: "gemini-1.5-flash",
                goals: "Strength and Hypertrophy",
                gymMember: true
            });

            const [oneRMs, setOneRMs] = useState({
                squat: 135, bench: 135, deadlift: 135, ohp: 65, rows: 95
            });

            const [programs, setPrograms] = useState([]);
            const [activeWorkout, setActiveWorkout] = useState(null);

            // Load Data
            useEffect(() => {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    const parsed = JSON.parse(saved);
                    setProfile(parsed.profile || profile);
                    setOneRMs(parsed.oneRMs || oneRMs);
                    setPrograms(parsed.programs || []);
                    setView(parsed.programs?.length > 0 ? 'home' : 'onboarding');
                } else {
                    setView('onboarding');
                }
            }, []);

            // Save Data
            useEffect(() => {
                if (view !== 'loading') {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify({ profile, oneRMs, programs }));
                }
            }, [profile, oneRMs, programs, view]);

            // --- AI GENERATOR WITH VIBE CHECK ---
            const generateProtocol = async () => {
                if (!profile.userApiKey) {
                    setErrorMsg("Please enter your API Key first.");
                    return;
                }
                setIsGenerating(true);

                const recoveryContext = recovery < 40 
                    ? "CRITICAL: User is exhausted. Suggest a deload/recovery week with 50% volume." 
                    : recovery < 70 ? "MODERATE: Standard progression." : "ELITE: User is fresh. High intensity and volume.";

                const prompt = `Generate a 3-day workout split. 
                User Maxes: Squat ${oneRMs.squat}lb, Bench ${oneRMs.bench}lb, Deadlift ${oneRMs.deadlift}lb.
                Goals: ${profile.goals}.
                ${recoveryContext}
                Output ONLY JSON: { "programs": [{ "id": "d1", "name": "Push", "exercises": [{ "id": "bench", "name": "Bench Press", "type": "primary", "sets": 3, "reps": 8, "weight": 135 }] }] }`;

                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${profile.aiModel}:generateContent?key=${profile.userApiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });
                    const data = await res.json();
                    const text = data.candidates[0].content.parts[0].text;
                    const cleanJson = JSON.parse(text.match(/\{[\s\S]*\}/)[0]);
                    
                    setPrograms(cleanJson.programs);
                    setView('home');
                } catch (e) {
                    setErrorMsg("API Error. Check key or connection.");
                } finally {
                    setIsGenerating(false);
                }
            };

            // --- VIEWS ---
            if (view === 'loading') return <div className="flex h-screen items-center justify-center">Loading...</div>;

            if (view === 'onboarding') return (
                <div className="p-6 max-w-md mx-auto min-h-screen flex flex-col justify-center">
                    <h1 className="text-3xl font-black mb-2 text-blue-500 italic">IRON BLUEPRINT</h1>
                    <p className="text-slate-400 mb-8">System Initialization...</p>

                    {onboardingStep === 1 && (
                        <div className="space-y-4 slide-up">
                            <label className="block text-sm font-bold uppercase tracking-widest text-slate-500">Google Gemini API Key</label>
                            <input 
                                type="password" 
                                placeholder="Enter Key..."
                                className="w-full bg-transparent border-b border-slate-700 py-3 text-xl input-focus-effect"
                                value={profile.userApiKey}
                                onChange={(e) => setProfile({...profile, userApiKey: e.target.value})}
                            />
                            <button 
                                onClick={() => profile.userApiKey ? setOnboardingStep(2) : setErrorMsg("Key required")}
                                className="w-full bg-blue-600 py-4 rounded-xl font-bold mt-4"
                            >
                                NEXT
                            </button>
                        </div>
                    )}

                    {onboardingStep === 2 && (
                        <div className="space-y-6 slide-up">
                            <h2 className="text-xl font-bold">Current 1RM Benchmarks</h2>
                            <div className="grid grid-cols-2 gap-4">
                                {Object.keys(oneRMs).map(lift => (
                                    <div key={lift} className="glass-card p-4 rounded-xl">
                                        <label className="block text-xs uppercase text-slate-400 mb-1">{lift}</label>
                                        <input 
                                            type="number"
                                            value={oneRMs[lift]}
                                            onChange={(e) => setOneRMs({...oneRMs, [lift]: parseInt(e.target.value) || 0})}
                                            className="text-2xl font-black w-full bg-transparent"
                                        />
                                    </div>
                                ))}
                            </div>
                            <button 
                                onClick={() => setOnboardingStep(3)}
                                className="w-full bg-blue-600 py-4 rounded-xl font-bold"
                            >
                                SET BENCHMARKS
                            </button>
                        </div>
                    )}

                    {onboardingStep === 3 && (
                        <div className="text-center space-y-6 slide-up">
                            <Icon name="cpu" size={64} className="text-blue-500 mb-4" />
                            <h2 className="text-2xl font-black">Generate your Protocol?</h2>
                            <p className="text-slate-400">The Oracle will analyze your benchmarks and goals to create a high-precision plan.</p>
                            <button 
                                onClick={generateProtocol}
                                disabled={isGenerating}
                                className={`w-full py-4 rounded-xl font-bold ${isGenerating ? 'bg-slate-800' : 'bg-blue-600'}`}
                            >
                                {isGenerating ? 'PROCESSING...' : 'INITIALIZE SYSTEM'}
                            </button>
                        </div>
                    )}

                    {errorMsg && <p className="mt-4 text-red-500 text-sm text-center">{errorMsg}</p>}
                </div>
            );

            if (view === 'home') return (
                <div className="p-6 max-w-md mx-auto">
                    <header className="flex justify-between items-center mb-8">
                        <div>
                            <h2 className="text-sm font-bold text-blue-500 uppercase tracking-tighter">Blueprint Pro</h2>
                            <h1 className="text-2xl font-black">COMMAND CENTER</h1>
                        </div>
                        <div className="w-12 h-12 rounded-full bg-slate-800 flex items-center justify-center border border-slate-700">
                            <Icon name="user" />
                        </div>
                    </header>

                    {/* Vibe Check Slider */}
                    <div className="glass-card p-5 rounded-3xl mb-6">
                        <div className="flex justify-between items-center mb-4">
                            <span className="text-sm font-bold text-slate-400 uppercase">Recovery Status</span>
                            <span className={`text-lg font-black ${recovery > 70 ? 'text-green-400' : 'text-yellow-400'}`}>{recovery}%</span>
                        </div>
                        <input 
                            type="range" 
                            className="w-full h-2 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-blue-500"
                            value={recovery}
                            onChange={(e) => setRecovery(e.target.value)}
                        />
                        <p className="text-[10px] text-slate-500 mt-2 uppercase text-center">Slide to adjust AI-generated intensity</p>
                    </div>

                    <h3 className="text-xs font-bold text-slate-500 uppercase mb-4 tracking-widest">Available Protocols</h3>
                    <div className="space-y-4">
                        {programs.map(prog => (
                            <div key={prog.id} className="glass-card p-6 rounded-3xl flex justify-between items-center group active:scale-95 transition-transform"
                                 onClick={() => { setActiveWorkout(prog); setView('active'); }}>
                                <div>
                                    <h4 className="text-xl font-black">{prog.name}</h4>
                                    <p className="text-sm text-slate-400">{prog.exercises.length} Exercises • Strength Focus</p>
                                </div>
                                <div className="bg-blue-600 p-3 rounded-2xl group-hover:bg-blue-500">
                                    <Icon name="play" size={20} />
                                </div>
                            </div>
                        ))}
                    </div>

                    <button 
                        onClick={() => setView('onboarding')}
                        className="w-full mt-12 py-4 border border-slate-800 rounded-xl text-slate-500 font-bold text-xs uppercase"
                    >
                        Reset System Configuration
                    </button>
                </div>
            );

            if (view === 'active' && activeWorkout) return (
                <div className="p-6 max-w-md mx-auto pb-safe">
                    <div className="flex justify-between items-center mb-6">
                        <button onClick={() => setView('home')} className="p-2 bg-slate-800 rounded-lg"><Icon name="x" /></button>
                        <h2 className="text-lg font-black">{activeWorkout.name}</h2>
                        <div className="text-blue-500 font-mono font-bold">SESSION</div>
                    </div>

                    <div className="space-y-6">
                        {activeWorkout.exercises.map((ex, exIdx) => (
                            <div key={exIdx} className="glass-card rounded-3xl p-5 border-l-4 border-blue-500">
                                <div className="flex justify-between items-start mb-4">
                                    <h3 className="text-lg font-black leading-tight uppercase">{ex.name}</h3>
                                    <span className="text-[10px] bg-slate-800 px-2 py-1 rounded font-bold text-slate-400 uppercase tracking-tighter">
                                        {ex.type}
                                    </span>
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="bg-black/30 p-3 rounded-xl border border-white/5">
                                        <div className="text-[10px] text-slate-500 uppercase font-bold">Weight</div>
                                        <div className="text-xl font-black">{ex.weight} <span className="text-sm font-normal">lb</span></div>
                                    </div>
                                    <div className="bg-black/30 p-3 rounded-xl border border-white/5">
                                        <div className="text-[10px] text-slate-500 uppercase font-bold">Target</div>
                                        <div className="text-xl font-black">{ex.sets}x{ex.reps}</div>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>

                    <button 
                        onClick={() => setView('home')}
                        className="w-full bg-green-600 py-4 rounded-2xl font-black text-xl mt-8 shadow-lg shadow-green-900/20"
                    >
                        COMPLETE SESSION
                    </button>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
