<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Iron Blueprint | Pro</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; background-color: black; color: white; }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
        input[type="number"] { -moz-appearance: textfield; background: transparent; border: none; outline: none; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .input-focus-effect:focus { border-bottom: 2px solid #3b82f6; }
        .animate-glow { animation: glow 2s infinite alternate; }
        @keyframes glow { from { box-shadow: 0 0 5px -5px #3b82f6; } to { box-shadow: 0 0 20px -5px #3b82f6; } }
    </style>
</head>
<body class="bg-black">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => { lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const STORAGE_KEY = 'iron_blueprint_react_v2';

        // Your physical inventory limit: 365 lbs
        const MAX_PHYSICAL_WEIGHT = 365;

        const BARBELL_LOADS = {
            45: [], 65: [10], 95: [25], 115: [35], 135: [45],
            155: [45, 10], 165: [35, 25], 185: [45, 25], 205: [45, 35],
            225: [45, 45], 245: [45, 45, 10], 255: [45, 35, 25],
            275: [45, 45, 25], 295: [45, 45, 35], 315: [45, 45, 35, 10],
            345: [45, 45, 35, 25], 365: [45, 45, 35, 25, 10]
        };

        const getWeekScheme = (weekNum, type) => {
            const schemes = {
                1: { primary: { reps: [12, 10, 10, 8], rpe: [6.5, 7, 7.5, 8] }, accessory: { sets: 4, reps: 12 } },
                2: { primary: { reps: [8, 6, 6, 4], rpe: [7, 8, 8.5, 9] }, accessory: { sets: 4, reps: 10 } },
                3: { primary: { reps: [5, 3, 2, 1], rpe: [8.5, 9, 9.5, 10] }, accessory: { sets: 3, reps: 8 } },
                4: { primary: { reps: [10, 10, 10], rpe: [5, 5, 5] }, accessory: { sets: 2, reps: 12 } }
            };
            return schemes[weekNum] ? schemes[weekNum][type] : schemes[1][type];
        };

        const BASE_PROGRAMS = [
            { id: 'day1', name: "Day 1: Chest & Back", focus: "Mass & Density", exercises: [{id:'bench', name:'BB Bench Press', type:'primary'}, {id:'rows', name:'BB Bent Over Rows', type:'primary'}, {id:'incline_db', name:'Incline DB Press', type:'accessory'}, {id:'pullovers', name:'DB Pullovers (Arnold Spec)', type:'accessory', note: "Final set: 15 reps + Slow Eccentric"}]},
            { id: 'day2', name: "Day 2: Legs (Squat)", focus: "Mister Squat High Bar", exercises: [{id:'squat', name:'Back Squat', type:'primary'}, {id:'rdl', name:'Romanian Deadlift', type:'primary'}, {id:'goblet', name:'Heavy Goblet Squat', type:'accessory'}, {id:'calves', name:'DB Calf Raises', type:'accessory', note: "Pause 2s at top"}]},
            { id: 'day3', name: "Day 3: Shoulders & Arms", focus: "Arnold Volume", exercises: [{id:'ohp', name:'Overhead Press', type:'primary'}, {id:'lateral', name:'DB Lateral Raise', type:'accessory', note: "Final set: Drop Set until failure"}, {id:'curls', name:'DB Alternate Curls', type:'accessory'}, {id:'triceps', name:'DB Skullcrushers', type:'accessory'}, {id:'cardio_liss', name:'LISS Cardio', type:'cardio', sets: 1, reps: '25m'}]},
            { id: 'day4', name: "Day 4: Chest & Back", focus: "Mass Variation", exercises: [{id:'bench', name:'BB Flat Bench', type:'primary'}, {id:'rows', name:'BB Rows (Underhand)', type:'primary'}, {id:'incline_db', name:'Incline DB Flyes', type:'accessory'}, {id:'db_row_single', name:'Single Arm DB Row', type:'accessory'}]},
            { id: 'day5', name: "Day 5: Legs (Deadlift)", focus: "Soflete Pull Day", exercises: [{id:'deadlift', name:'Conventional Deadlift', type:'primary'}, {id:'weighted_pullup', name:'Weighted Pullups', type:'accessory'}, {id:'shrugs', name:'DB Shrugs', type:'accessory', note: "High volume: 15+ reps"}, {id:'db_lunge', name:'DB Lunges', type:'accessory'}]},
            { id: 'day6', name: "Day 6: Shoulders & Arms", focus: "Pump + HIIT", exercises: [{id:'ohp', name:'Seated DB Press', type:'accessory', sets: 4, reps: 10}, {id:'lateral', name:'DB Lateral Raise', type:'accessory'}, {id:'curls', name:'DB Hammer Curls', type:'accessory'}, {id:'triceps', name:'DB Overheads', type:'accessory'}, {id:'cardio_hiit', name:'HIIT Cardio (60/60)', type:'cardio', sets: 1, reps: '15m'}]}
        ];

        const roundToEquipment = (weight, isDB = false) => {
            if (isDB) return Math.round(Math.min(90, Math.max(5, weight)) / 5) * 5;
            const possible = Object.keys(BARBELL_LOADS).map(Number);
            return possible.reduce((prev, curr) => Math.abs(curr - weight) < Math.abs(prev - weight) ? curr : prev);
        };

        function App() {
            const [view, setView] = useState('home');
            const [oneRMs, setOneRMs] = useState({ squat: 225, bench: 185, deadlift: 315, ohp: 135, rows: 155 });
            const [history, setHistory] = useState([]);
            const [currentWeek, setCurrentWeek] = useState(1);
            const [activeWorkout, setActiveWorkout] = useState(null);
            const [timer, setTimer] = useState(0);
            const [showSettings, setShowSettings] = useState(false);

            useEffect(() => {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    const parsed = JSON.parse(saved);
                    if (parsed.oneRMs) setOneRMs(parsed.oneRMs);
                    if (parsed.history) setHistory(parsed.history);
                    if (parsed.currentWeek) setCurrentWeek(parsed.currentWeek);
                }
            }, []);

            useEffect(() => {
                localStorage.setItem(STORAGE_KEY, JSON.stringify({ oneRMs, history, currentWeek }));
            }, [oneRMs, history, currentWeek]);

            useEffect(() => {
                let interval;
                if (timer > 0) interval = setInterval(() => setTimer(prev => prev - 1), 1000);
                return () => clearInterval(interval);
            }, [timer]);

            const startWorkout = (prog) => {
                const session = {
                    id: Date.now(),
                    name: prog.name,
                    week: currentWeek,
                    exercises: prog.exercises.map(ex => {
                        if (ex.type === 'cardio') {
                            return { ...ex, sets: [{ weight: 0, reps: ex.reps, completed: false }] };
                        }
                        const scheme = getWeekScheme(currentWeek, ex.type);
                        const setsCount = ex.type === 'primary' ? scheme.reps.length : (ex.sets || scheme.sets);
                        const sets = Array.from({ length: setsCount }).map((_, i) => {
                            let targetWeight = 0;
                            let targetReps = ex.type === 'primary' ? scheme.reps[i] : (ex.reps || scheme.reps);
                            if (ex.type === 'primary') {
                                const intensity = (scheme.rpe[i] / 10) * (1.0278 - 0.0278 * targetReps);
                                targetWeight = roundToEquipment(oneRMs[ex.id] * intensity);
                            } else {
                                const lastLog = history.flatMap(h => h.exercises).findLast(e => e.id === ex.id);
                                targetWeight = roundToEquipment(lastLog ? Number(lastLog.sets[0].weight) + 5 : 25, true);
                            }
                            return { weight: targetWeight, reps: targetReps, completed: false };
                        });
                        return { ...ex, sets };
                    })
                };
                setActiveWorkout(session);
                setView('active');
            };

            const handleWeightChange = (exIdx, setIdx, newVal) => {
                const newWorkout = { ...activeWorkout };
                const weight = parseInt(newVal) || 0;
                const oldWeight = newWorkout.exercises[exIdx].sets[setIdx].weight;
                const diff = weight - oldWeight;
                const isDB = newWorkout.exercises[exIdx].type === 'accessory';

                newWorkout.exercises[exIdx].sets[setIdx].weight = weight;

                for (let i = setIdx + 1; i < newWorkout.exercises[exIdx].sets.length; i++) {
                    if (!newWorkout.exercises[exIdx].sets[i].completed) {
                        const nextTarget = newWorkout.exercises[exIdx].sets[i].weight + diff;
                        newWorkout.exercises[exIdx].sets[i].weight = roundToEquipment(nextTarget, isDB);
                    }
                }
                setActiveWorkout(newWorkout);
            };

            const handleRepChange = (exIdx, setIdx, newVal) => {
                const newWorkout = { ...activeWorkout };
                newWorkout.exercises[exIdx].sets[setIdx].reps = newVal;
                setActiveWorkout(newWorkout);
            };

            const toggleSet = (exIdx, setIdx) => {
                const newWorkout = { ...activeWorkout };
                const isCompleted = !newWorkout.exercises[exIdx].sets[setIdx].completed;
                newWorkout.exercises[exIdx].sets[setIdx].completed = isCompleted;
                if (isCompleted) setTimer(90);
                setActiveWorkout(newWorkout);
            };

            const finishWorkout = () => {
                const updated1RMs = { ...oneRMs };
                activeWorkout.exercises.forEach(ex => {
                    if (ex.type === 'primary') {
                        const completed = ex.sets.filter(s => s.completed);
                        if (completed.length) {
                            const heaviest = Math.max(...completed.map(s => Number(s.weight)));
                            const best = completed.find(s => Number(s.weight) === heaviest);
                            const e1rm = Math.round(Number(best.weight) / (1.0278 - 0.0278 * Number(best.reps)));
                            if (e1rm > (oneRMs[ex.id] || 0)) updated1RMs[ex.id] = e1rm;
                        }
                    }
                });
                const newHistory = [{...activeWorkout, date: new Date().toLocaleDateString()}, ...history];
                setHistory(newHistory);
                setOneRMs(updated1RMs);
                if (newHistory.filter(h => h.week === currentWeek).length >= 6) {
                    setCurrentWeek(prev => prev === 4 ? 1 : prev + 1);
                }
                setActiveWorkout(null);
                setView('home');
            };

            return (
                <div className="min-h-screen bg-black text-slate-100 font-sans p-4 pb-24 max-w-lg mx-auto selection:bg-blue-500 selection:text-white">
                    <header className="flex justify-between items-center mb-6 pt-8 border-b border-slate-900 pb-4">
                        <div>
                            <h1 className="text-2xl font-black italic tracking-tighter text-white uppercase">IRON <span className="text-blue-500">BLUEPRINT</span></h1>
                            <div className="flex items-center gap-2 mt-1">
                                <span className="text-[10px] uppercase font-bold text-slate-500 tracking-[0.2em] italic">Pro Performance</span>
                                <div className="h-1 w-1 rounded-full bg-blue-500"></div>
                                <span className="text-[10px] uppercase font-bold text-blue-500 tracking-[0.2em]">Week {currentWeek}</span>
                            </div>
                        </div>
                        <button onClick={() => setShowSettings(true)} className="p-2 bg-slate-900 rounded-full border border-slate-800 active:scale-90 transition-transform shadow-lg shadow-blue-500/10">
                            <Icon name="settings" size={20} />
                        </button>
                    </header>

                    {view === 'home' && (
                        <div className="space-y-4">
                            <div className="grid grid-cols-2 gap-2 mb-6">
                                {['squat', 'bench', 'deadlift', 'ohp'].map(l => (
                                    <div key={l} className="bg-slate-900/40 p-4 rounded-2xl border border-slate-800 relative overflow-hidden">
                                        <span className="text-[10px] uppercase text-slate-500 font-black block mb-1 tracking-widest">{l}</span>
                                        <span className="text-2xl font-black tracking-tight">{oneRMs[l]}<span className="text-xs ml-1 text-slate-600 font-black">LB</span></span>
                                        {oneRMs[l] >= MAX_PHYSICAL_WEIGHT && l !== 'bench' && l !== 'ohp' && (
                                            <div className="absolute top-2 right-2 text-amber-500"><Icon name="alert-triangle" size={12}/></div>
                                        )}
                                    </div>
                                ))}
                            </div>
                            
                            <div className="flex justify-between items-end px-1">
                                <h2 className="text-[10px] font-black text-slate-500 uppercase tracking-[0.3em] italic">The 6-Day Split</h2>
                                <span className="text-[9px] font-bold text-slate-700 uppercase">Inventory Limit: {MAX_PHYSICAL_WEIGHT}LB</span>
                            </div>

                            <div className="space-y-3">
                                {BASE_PROGRAMS.map(p => (
                                    <button key={p.id} onClick={() => startWorkout(p)} className="w-full text-left bg-gradient-to-br from-slate-900 to-slate-950 p-6 rounded-[2rem] border border-slate-800 flex justify-between items-center group active:scale-[0.98] transition-all relative overflow-hidden shadow-xl">
                                        <div className="relative z-10">
                                            <span className="text-[9px] bg-blue-600/20 text-blue-400 border border-blue-500/30 px-2 py-0.5 rounded-full font-black uppercase tracking-widest">{p.focus}</span>
                                            <h3 className="text-xl font-black mt-1 italic uppercase tracking-tighter">{p.name}</h3>
                                        </div>
                                        <Icon name="play" size={24} className="text-blue-500 opacity-20 group-hover:opacity-100 transition-opacity" />
                                    </button>
                                ))}
                            </div>
                        </div>
                    )}

                    {view === 'history' && (
                        <div className="space-y-4">
                            <h2 className="text-[10px] font-black text-slate-500 uppercase tracking-[0.3em] px-1 italic">Training Intel</h2>
                            {history.length === 0 ? <p className="text-center text-slate-600 py-12 italic">No data logged yet.</p> : history.map(h => (
                                <div key={h.id} className="bg-slate-900/60 p-6 rounded-[2rem] border border-slate-800">
                                    <h4 className="font-black italic uppercase text-blue-400 tracking-tighter text-lg leading-tight">{h.name}</h4>
                                    <p className="text-[10px] text-slate-500 font-bold uppercase tracking-widest">{h.date} • Week {h.week}</p>
                                    <div className="mt-4 space-y-2">
                                        {h.exercises.map((e,i) => (
                                            <div key={i} className="text-xs flex justify-between border-b border-slate-800/50 pb-2 last:border-0 last:pb-0 items-center">
                                                <span className="font-bold text-slate-300">{e.name}</span>
                                                <span className="text-blue-500 font-mono font-bold uppercase text-[10px] bg-blue-500/5 px-2 py-1 rounded-md">{e.sets.filter(s=>s.completed).length}/{e.sets.length} sets</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}

                    {view === 'active' && activeWorkout && (
                        <div className="space-y-6 pb-24">
                            <div className="flex justify-between items-center sticky top-[80px] z-30 bg-black/90 py-3 backdrop-blur-md">
                                <h2 className="text-xl font-black italic uppercase tracking-tighter">{activeWorkout.name}</h2>
                                <button onClick={() => { if(confirm("Discard current progress?")) setView('home') }} className="text-red-500 text-[9px] font-black uppercase tracking-widest bg-red-500/10 px-3 py-1.5 rounded-full active:bg-red-500 active:text-white transition-colors">Discard</button>
                            </div>
                            {activeWorkout.exercises.map((ex, exIdx) => (
                                <div key={exIdx} className="bg-slate-900/80 rounded-[2.5rem] border border-slate-800 overflow-hidden shadow-2xl">
                                    <div className="p-5 bg-slate-800/40 border-b border-slate-800 flex justify-between items-start">
                                        <div>
                                            <h3 className="font-black italic uppercase text-sm tracking-tight leading-tight">{ex.name}</h3>
                                            {ex.note && <p className="text-[9px] text-blue-400 uppercase font-black tracking-widest mt-1 opacity-80">{ex.note}</p>}
                                        </div>
                                        <span className={`text-[9px] font-black uppercase px-2 py-0.5 rounded-full ${ex.type === 'cardio' ? 'bg-green-500/10 text-green-500 border border-green-500/20' : 'bg-slate-950/50 text-slate-500 border border-slate-800'}`}>{ex.type}</span>
                                    </div>
                                    <div className="p-3 space-y-2">
                                        {ex.sets.map((s, si) => {
                                            const plateCalc = ex.type === 'primary' && BARBELL_LOADS[s.weight] ? BARBELL_LOADS[s.weight] : null;
                                            const weightLimitWarning = ex.type === 'primary' && s.weight >= MAX_PHYSICAL_WEIGHT;

                                            return (
                                                <div key={si} className={`flex items-center gap-3 p-4 rounded-3xl transition-all ${s.completed ? 'opacity-30 bg-blue-500/5' : 'bg-slate-950/40 border border-slate-800/50 shadow-inner'}`}>
                                                    <div className="flex-1 flex items-center gap-4">
                                                        <span className="text-[10px] font-black text-slate-700 italic">#{si+1}</span>
                                                        <div className="flex flex-col gap-0.5">
                                                            {ex.type === 'cardio' ? (
                                                                <input 
                                                                    type="text" 
                                                                    value={s.reps}
                                                                    onChange={(e) => handleRepChange(exIdx, si, e.target.value)}
                                                                    className="text-2xl font-black tracking-tighter leading-none text-green-400 w-full"
                                                                />
                                                            ) : (
                                                                <div className="flex items-baseline gap-1">
                                                                    <input 
                                                                        type="number" 
                                                                        value={s.weight}
                                                                        onChange={(e) => handleWeightChange(exIdx, si, e.target.value)}
                                                                        className={`text-3xl font-black tracking-tighter leading-none w-20 input-focus-effect ${weightLimitWarning ? 'text-amber-500' : 'text-white'}`}
                                                                    />
                                                                    <span className="text-[10px] text-slate-600 font-black">LB</span>
                                                                </div>
                                                            )}
                                                            <div className="flex items-center gap-1">
                                                                {ex.type !== 'cardio' && (
                                                                    <input 
                                                                        type="number" 
                                                                        value={s.reps}
                                                                        onChange={(e) => handleRepChange(exIdx, si, e.target.value)}
                                                                        className="text-[10px] font-black text-slate-500 uppercase tracking-tighter w-8 input-focus-effect"
                                                                    />
                                                                )}
                                                                <span className="text-[9px] font-black text-slate-500 uppercase tracking-tighter">{ex.type === 'cardio' ? 'Block Duration' : 'Reps Target'}</span>
                                                                {weightLimitWarning && <span className="text-[9px] font-black text-amber-500 uppercase tracking-tighter ml-2 italic">Max Plates - Go Slow Tempo</span>}
                                                            </div>
                                                        </div>
                                                        {plateCalc && s.weight > 0 && (
                                                            <div className="ml-auto flex gap-1 flex-wrap justify-end max-w-[100px]">
                                                                {plateCalc.map((p,i)=>(
                                                                    <span key={i} className={`text-[8px] font-black px-1.5 py-0.5 rounded border border-white/5 shadow-sm ${p===45?'bg-red-900/60 text-red-200 border-red-500/20':'bg-slate-800 text-slate-400'}`}>
                                                                        {p}
                                                                    </span>
                                                                ))}
                                                            </div>
                                                        )}
                                                    </div>
                                                    <button onClick={() => toggleSet(exIdx, si)} className={`w-14 h-14 rounded-2xl flex items-center justify-center border transition-all active:scale-90 shadow-xl ${s.completed ? 'bg-blue-600 border-blue-600 shadow-blue-500/40' : 'bg-slate-800 border-slate-700 text-slate-500'}`}>
                                                        <Icon name="check-circle-2" size={28} />
                                                    </button>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            ))}
                            <button onClick={finishWorkout} className="w-full bg-blue-600 py-6 rounded-[2rem] font-black italic text-xl tracking-tighter shadow-2xl shadow-blue-900/40 active:scale-95 transition-all uppercase mb-10 border-t border-blue-400/30">FINISH SESSION</button>
                        </div>
                    )}

                    {timer > 0 && (
                        <div className="fixed bottom-24 left-1/2 -translate-x-1/2 bg-blue-600 px-6 py-4 rounded-full flex items-center gap-4 shadow-2xl z-50 animate-pulse border border-blue-400 ring-4 ring-blue-600/20 animate-glow">
                            <Icon name="timer" size={20} />
                            <span className="font-mono font-black text-2xl tracking-tighter italic leading-none">{Math.floor(timer/60)}:{(timer%60).toString().padStart(2,'0')}</span>
                            <button onClick={()=>setTimer(0)} className="bg-blue-700 rounded-full p-1 active:scale-75"><Icon name="x" size={16} /></button>
                        </div>
                    )}

                    {showSettings && (
                        <div className="fixed inset-0 bg-black/98 z-[100] p-6 backdrop-blur-3xl overflow-y-auto">
                            <div className="max-w-md mx-auto pb-20 pt-10">
                                <div className="flex justify-between items-center mb-10">
                                    <h2 className="text-2xl font-black italic uppercase underline decoration-blue-500 decoration-8 underline-offset-8 tracking-tighter">Pro Config</h2>
                                    <button onClick={()=>setShowSettings(false)} className="bg-slate-900 p-2 rounded-full border border-slate-800 shadow-xl"><Icon name="x" size={24}/></button>
                                </div>
                                <section className="space-y-12">
                                    <div className="bg-blue-500/5 border border-blue-500/20 p-5 rounded-3xl">
                                        <h3 className="text-[10px] font-black text-blue-400 uppercase tracking-widest mb-2 flex items-center gap-2">
                                            <Icon name="user" size={12}/> Profile: Intermediate-Advanced
                                        </h3>
                                        <p className="text-[10px] text-slate-500 font-bold uppercase tracking-tighter">Current Plan: Arnold Blueprint x Soflete Hybrid. Managed RPE enabled.</p>
                                    </div>

                                    <div>
                                        <label className="text-[10px] font-black uppercase text-slate-500 tracking-[0.4em] mb-6 block italic px-1">Training Block</label>
                                        <div className="grid grid-cols-4 gap-3">
                                            {['Hyper', 'Power', 'Str', 'Del'].map((name, i)=>(
                                                <button key={i} onClick={() => setCurrentWeek(i+1)} className={`p-5 rounded-2xl font-black transition-all border flex flex-col items-center gap-1 ${currentWeek===(i+1)?'bg-blue-600 text-white border-blue-500 shadow-xl shadow-blue-500/20':'bg-slate-900 text-slate-600 border-slate-800'}`}>
                                                    <span className="text-[8px] uppercase tracking-widest leading-none mb-1 opacity-70">{name}</span>
                                                    <span className="leading-none">W{i+1}</span>
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                    <div>
                                        <label className="text-[10px] font-black uppercase text-slate-500 tracking-[0.4em] mb-6 block italic px-1">1RM Benchmarks (lbs)</label>
                                        <div className="space-y-3">
                                            {Object.keys(oneRMs).map(l=>(
                                                <div key={l} className="flex justify-between items-center bg-slate-900 p-5 rounded-3xl border border-slate-800/60 shadow-inner">
                                                    <span className="text-xs font-black uppercase text-slate-500 italic tracking-widest">{l}</span>
                                                    <div className="flex items-center gap-2">
                                                        <input type="number" value={oneRMs[l]} onChange={(e)=>setOneRMs({...oneRMs, [l]: parseInt(e.target.value)||0})} className="bg-black/50 border border-slate-700 rounded-xl p-3 w-24 text-right text-blue-400 font-bold font-mono focus:border-blue-500 outline-none transition-colors" />
                                                        <span className="text-[10px] font-black text-slate-700">LB</span>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    <button onClick={()=>{if(window.confirm("Nuclear Option: Delete all history and benchmarks?")){localStorage.clear(); window.location.reload();}}} className="w-full py-5 text-red-500 text-[10px] font-black uppercase tracking-widest border border-red-500/10 rounded-3xl mt-12 active:bg-red-500 active:text-white transition-all shadow-lg">Wipe Local Storage</button>
                                </section>
                            </div>
                        </div>
                    )}

                    <nav className="fixed bottom-0 left-0 right-0 bg-black/90 backdrop-blur-xl border-t border-slate-900 p-4 flex justify-around items-center pb-safe z-40 shadow-[0_-10px_40px_rgba(0,0,0,0.8)] px-8">
                        <button onClick={() => setView('home')} className={`flex flex-col items-center gap-1 transition-all active:scale-90 ${view === 'home' ? 'text-blue-500 drop-shadow-[0_0_8px_rgba(59,130,246,0.5)]' : 'text-slate-700'}`}>
                            <Icon name="dumbbell" size={24} />
                            <span className="text-[9px] font-black uppercase italic tracking-widest">Train</span>
                        </button>
                        <div className="w-16 h-16 bg-blue-600 rounded-full flex items-center justify-center -mt-16 border-[6px] border-black shadow-2xl shadow-blue-900/60 active:scale-95 transition-transform ring-4 ring-black ring-offset-0 relative">
                            <Icon name="trending-up" size={32} className="text-white" />
                            <div className="absolute -bottom-1 w-1 h-1 bg-white rounded-full opacity-50"></div>
                        </div>
                        <button onClick={() => setView('history')} className={`flex flex-col items-center gap-1 transition-all active:scale-90 ${view === 'history' ? 'text-blue-500 drop-shadow-[0_0_8px_rgba(59,130,246,0.5)]' : 'text-slate-700'}`}>
                            <Icon name="history" size={24} />
                            <span className="text-[9px] font-black uppercase italic tracking-widest">History</span>
                        </button>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
