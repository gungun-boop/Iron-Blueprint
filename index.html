<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Iron Blueprint | Pro</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; background-color: black; color: white; }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
        input[type="number"], input[type="text"], input[type="password"], select { -moz-appearance: textfield; background: transparent; border: none; outline: none; color: white; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .input-focus-effect:focus { border-bottom: 2px solid #3b82f6; }
        .glass-card { background: rgba(30, 41, 59, 0.4); border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .meal-checkbox:checked + label { color: #3b82f6; text-decoration: line-through; opacity: 0.5; }
    </style>
</head>
<body class="bg-black">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => { lucide.createIcons(); }, [name, className]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const STORAGE_KEY = 'iron_blueprint_react_v2';
        // Initializing with your provided key.
        const DEFAULT_API_KEY = "AIzaSyA832U4qJre0n_t0EqyQQL_2M9q8Cy7qd8"; 

        const BARBELL_LOADS = {
            45: [], 65: [10], 95: [25], 115: [35], 135: [45],
            155: [45, 10], 165: [35, 25], 185: [45, 25], 205: [45, 35],
            225: [45, 45], 245: [45, 45, 10], 255: [45, 35, 25],
            275: [45, 45, 25], 295: [45, 45, 35], 315: [45, 45, 35, 10],
            345: [45, 45, 35, 25], 365: [45, 45, 35, 25, 10]
        };

        const getWeekScheme = (weekNum, type) => {
            const schemes = {
                1: { primary: { reps: [12, 10, 10, 8], rpe: [6.5, 7, 7.5, 8] }, accessory: { sets: 4, reps: 12 } },
                2: { primary: { reps: [8, 6, 6, 4], rpe: [7, 8, 8.5, 9] }, accessory: { sets: 4, reps: 10 } },
                3: { primary: { reps: [5, 3, 2, 1], rpe: [8.5, 9, 9.5, 10] }, accessory: { sets: 3, reps: 8 } },
                4: { primary: { reps: [10, 10, 10], rpe: [5, 5, 5] }, accessory: { sets: 2, reps: 12 } }
            };
            return schemes[weekNum] ? schemes[weekNum][type] : schemes[1][type];
        };

        const BASE_PROGRAMS = [
            { id: 'day1', name: "Day 1: Chest & Back", focus: "Mass & Density", exercises: [{id:'bench', name:'BB Bench Press', type:'primary'}, {id:'rows', name:'BB Bent Over Rows', type:'primary'}, {id:'incline_db', name:'Incline DB Press', type:'accessory'}, {id:'pullovers', name:'DB Pullovers', type:'accessory', note: "Arnold Finisher: 15 reps"}]},
            { id: 'day2', name: "Day 2: Legs (Squat)", focus: "Mister Squat", exercises: [{id:'squat', name:'Back Squat', type:'primary'}, {id:'rdl', name:'Romanian Deadlift', type:'primary'}, {id:'goblet', name:'Heavy Goblet Squat', type:'accessory'}, {id:'calves', name:'DB Calf Raises', type:'accessory'}]},
            { id: 'day3', name: "Day 3: Shoulders & Arms", focus: "Arnold Volume", exercises: [{id:'ohp', name:'Overhead Press', type:'primary'}, {id:'lateral', name:'DB Lateral Raise', type:'accessory'}, {id:'curls', name:'DB Alternate Curls', type:'accessory'}, {id:'triceps', name:'DB Skullcrushers', type:'accessory'}, {id:'cardio_liss', name:'LISS Cardio', type:'cardio', reps: '25m'}]},
            { id: 'day4', name: "Day 4: Chest & Back", focus: "Mass Variation", exercises: [{id:'bench', name:'BB Flat Bench', type:'primary'}, {id:'rows', name:'BB Rows (Underhand)', type:'primary'}, {id:'incline_db', name:'Incline DB Flyes', type:'accessory'}, {id:'db_row_single', name:'Single Arm DB Row', type:'accessory'}]},
            { id: 'day5', name: "Day 5: Legs (Deadlift)", focus: "Soflete Pull", exercises: [{id:'deadlift', name:'Conventional Deadlift', type:'primary'}, {id:'weighted_pullup', name:'Weighted Pullups', type:'accessory'}, {id:'shrugs', name:'DB Shrugs', type:'accessory'}, {id:'db_lunge', name:'DB Lunges', type:'accessory'}]},
            { id: 'day6', name: "Day 6: Shoulders & Arms", focus: "Pump + HIIT", exercises: [{id:'ohp', name:'Seated DB Press', type:'accessory', sets: 4, reps: 10}, {id:'lateral', name:'DB Lateral Raise', type:'accessory'}, {id:'curls', name:'DB Hammer Curls', type:'accessory'}, {id:'triceps', name:'DB Overheads', type:'accessory'}, {id:'cardio_hiit', name:'HIIT Cardio (Sprints)', type:'cardio', reps: '15m'}]}
        ];

        function App() {
            const [view, setView] = useState('home');
            const [oneRMs, setOneRMs] = useState({ squat: 225, bench: 185, deadlift: 315, ohp: 135, rows: 155 });
            const [history, setHistory] = useState([]);
            const [currentWeek, setCurrentWeek] = useState(1);
            const [activeWorkout, setActiveWorkout] = useState(null);
            const [timer, setTimer] = useState(0);
            const [showSettings, setShowSettings] = useState(false);
            const [isGenerating, setIsGenerating] = useState(false);
            const [selectedRecipe, setSelectedRecipe] = useState(null);
            const [errorMsg, setErrorMsg] = useState(null);
            
            const [profile, setProfile] = useState({
                weight: 195,
                height: 70,
                age: 34,
                targetWeight: 205,
                store: 'Walmart',
                weeklyBudget: 120,
                userApiKey: DEFAULT_API_KEY
            });

            const [groceryList, setGroceryList] = useState([]);
            const [recipes, setRecipes] = useState([]);

            useEffect(() => {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    const parsed = JSON.parse(saved);
                    if (parsed.oneRMs) setOneRMs(parsed.oneRMs);
                    if (parsed.history) setHistory(parsed.history);
                    if (parsed.currentWeek) setCurrentWeek(parsed.currentWeek);
                    if (parsed.profile) setProfile(prev => ({...prev, ...parsed.profile}));
                    if (parsed.groceryList) setGroceryList(parsed.groceryList);
                    if (parsed.recipes) setRecipes(parsed.recipes);
                }
            }, []);

            useEffect(() => {
                localStorage.setItem(STORAGE_KEY, JSON.stringify({ oneRMs, history, currentWeek, profile, groceryList, recipes }));
            }, [oneRMs, history, currentWeek, profile, groceryList, recipes]);

            useEffect(() => {
                let interval;
                if (timer > 0) interval = setInterval(() => setTimer(prev => prev - 1), 1000);
                return () => clearInterval(interval);
            }, [timer]);

            const stats = useMemo(() => {
                const weightKg = profile.weight * 0.453592;
                const heightCm = profile.height * 2.54;
                const bmr = (10 * weightKg) + (6.25 * heightCm) - (5 * profile.age) + 5;
                const tdee = bmr * 1.725;
                let targetCals = tdee;
                if (profile.targetWeight > profile.weight) targetCals += 400;
                if (profile.targetWeight < profile.weight) targetCals -= 400;
                const bmi = (profile.weight / (profile.height * profile.height)) * 703;
                return {
                    calories: Math.round(targetCals),
                    bmi: bmi.toFixed(1),
                    protein: Math.round(profile.weight * 1.1),
                    fats: Math.round(profile.weight * 0.4),
                    carbs: Math.round((targetCals - (profile.weight * 1.1 * 4) - (profile.weight * 0.4 * 9)) / 4)
                };
            }, [profile]);

            const groceryTotal = useMemo(() => {
                return groceryList.reduce((sum, item) => sum + (Number(item.estPrice) || 0), 0);
            }, [groceryList]);

            const generateFuelPlan = async () => {
                if (!profile.userApiKey) {
                    setErrorMsg("API Key Missing. Add it in Settings.");
                    setTimeout(() => setErrorMsg(null), 4000);
                    return;
                }

                setIsGenerating(true);
                const systemPrompt = `You are a professional performance nutritionist.
                    Create a 7-day high-efficiency meal plan for ${profile.store}.
                    Targets: ${stats.calories} kcal/day for a 195lb athlete moving toward ${profile.targetWeight}lb.
                    Budget: $${profile.weeklyBudget}.
                    
                    Rules:
                    1. Categorize: Breakfast, Lunch, Dinner, Snack.
                    2. Efficiency: Prioritize bulk meats, rice, frozen veggies.
                    3. Format: Return ONLY a valid JSON object.
                    
                    JSON structure:
                    {
                      "groceries": [{"id": 1, "item": "string", "category": "Protein|Carb|Fat", "qty": "string", "estPrice": 0.00}],
                      "recipes": [{"id": 1, "category": "Breakfast|Lunch|Dinner|Snack", "title": "string", "description": "string", "instructions": ["step1", "step2"], "macros": "string", "frequency": 7}]
                    }`;

                try {
                    // Using gemini-1.5-flash for reliability outside preview env
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${profile.userApiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: `Create plan for ${profile.store} at $${profile.weeklyBudget}` }] }],
                            systemInstruction: { parts: [{ text: systemPrompt }] },
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });
                    
                    if (!response.ok) {
                        const errData = await response.json();
                        throw new Error(errData.error?.message || "API Error");
                    }

                    const result = await response.json();
                    let textResult = result.candidates[0].content.parts[0].text;
                    
                    // Cleanup JSON if AI added markdown
                    const cleanJson = textResult.replace(/```json|```/g, "").trim();
                    const data = JSON.parse(cleanJson);
                    
                    setGroceryList(data.groceries.map(g => ({ ...g, bought: false })));
                    setRecipes(data.recipes.map(r => ({
                        ...r,
                        checklist: Array(r.frequency).fill(false)
                    })));
                    setErrorMsg(null);
                } catch (err) {
                    setErrorMsg(`AI Sync Error: ${err.message}`);
                    setTimeout(() => setErrorMsg(null), 6000);
                } finally {
                    setIsGenerating(false);
                }
            };

            const toggleMealCheck = (recipeId, index) => {
                setRecipes(recipes.map(r => {
                    if (r.id === recipeId) {
                        const newChecklist = [...r.checklist];
                        newChecklist[index] = !newChecklist[index];
                        return { ...r, checklist: newChecklist };
                    }
                    return r;
                }));
            };

            const toggleGrocery = (id) => {
                setGroceryList(groceryList.map(item => item.id === id ? { ...item, bought: !item.bought } : item));
            };

            const startWorkout = (prog) => {
                const session = {
                    id: Date.now(),
                    name: prog.name,
                    week: currentWeek,
                    exercises: prog.exercises.map(ex => {
                        if (ex.type === 'cardio') return { ...ex, sets: [{ weight: 0, reps: ex.reps, completed: false }] };
                        const scheme = getWeekScheme(currentWeek, ex.type);
                        const setsCount = ex.type === 'primary' ? scheme.reps.length : (ex.sets || scheme.sets);
                        const sets = Array.from({ length: setsCount }).map((_, i) => {
                            let targetWeight = 0;
                            let targetReps = ex.type === 'primary' ? scheme.reps[i] : (ex.reps || scheme.reps);
                            if (ex.type === 'primary') {
                                const intensity = (scheme.rpe[i] / 10) * (1.0278 - 0.0278 * targetReps);
                                targetWeight = roundToEquipment(oneRMs[ex.id] * intensity);
                            } else {
                                const allEx = history.flatMap(h => h.exercises);
                                const last = [...allEx].reverse().find(e => e.id === ex.id);
                                targetWeight = roundToEquipment(last ? Number(last.sets[0].weight) + 5 : 25, true);
                            }
                            return { weight: targetWeight, reps: targetReps, completed: false };
                        });
                        return { ...ex, sets };
                    })
                };
                setActiveWorkout(session);
                setView('active');
            };

            const handleWeightChange = (exIdx, setIdx, newVal) => {
                const newWorkout = { ...activeWorkout };
                const weight = parseInt(newVal) || 0;
                const diff = weight - newWorkout.exercises[exIdx].sets[setIdx].weight;
                newWorkout.exercises[exIdx].sets[setIdx].weight = weight;
                for (let i = setIdx + 1; i < newWorkout.exercises[exIdx].sets.length; i++) {
                    if (!newWorkout.exercises[exIdx].sets[i].completed) {
                        const next = newWorkout.exercises[exIdx].sets[i].weight + diff;
                        newWorkout.exercises[exIdx].sets[i].weight = roundToEquipment(next, newWorkout.exercises[exIdx].type === 'accessory');
                    }
                }
                setActiveWorkout(newWorkout);
            };

            const toggleSet = (exIdx, setIdx) => {
                const newWorkout = { ...activeWorkout };
                newWorkout.exercises[exIdx].sets[setIdx].completed = !newWorkout.exercises[exIdx].sets[setIdx].completed;
                if (newWorkout.exercises[exIdx].sets[setIdx].completed) setTimer(90);
                setActiveWorkout(newWorkout);
            };

            const roundToEquipment = (weight, isDB = false) => {
                if (isDB) return Math.round(Math.min(90, Math.max(5, weight)) / 5) * 5;
                const p = Object.keys(BARBELL_LOADS).map(Number);
                return p.reduce((a, b) => Math.abs(b - weight) < Math.abs(a - weight) ? b : a);
            };

            const finishWorkout = () => {
                const updated1RMs = { ...oneRMs };
                activeWorkout.exercises.forEach(ex => {
                    if (ex.type === 'primary') {
                        const comp = ex.sets.filter(s => s.completed);
                        if (comp.length) {
                            const weights = comp.map(s => Number(s.weight));
                            const maxWeight = Math.max(...weights);
                            const bestSet = comp.find(s => Number(s.weight) === maxWeight);
                            const e1rm = Math.round(Number(bestSet.weight) / (1.0278 - 0.0278 * Number(bestSet.reps)));
                            if (e1rm > (oneRMs[ex.id] || 0)) updated1RMs[ex.id] = e1rm;
                        }
                    }
                });
                setHistory([{...activeWorkout, date: new Date().toLocaleDateString()}, ...history]);
                setOneRMs(updated1RMs);
                if (history.filter(h => h.week === currentWeek).length >= 5) setCurrentWeek(prev => prev === 4 ? 1 : prev + 1);
                setActiveWorkout(null);
                setView('home');
            };

            return (
                <div className="min-h-screen bg-black text-slate-100 font-sans p-4 pb-24 max-w-lg mx-auto overflow-x-hidden">
                    {errorMsg && (
                        <div className="fixed top-8 left-4 right-4 z-[300] bg-red-600 p-4 rounded-2xl shadow-2xl">
                            <p className="text-[10px] font-black uppercase text-center tracking-widest leading-snug">{errorMsg}</p>
                        </div>
                    )}

                    <header className="flex justify-between items-center mb-6 pt-8 border-b border-slate-900 pb-4 px-2">
                        <div>
                            <h1 className="text-2xl font-black italic tracking-tighter text-white uppercase leading-none">IRON <span className="text-blue-500">BLUEPRINT</span></h1>
                            <div className="flex items-center gap-2 mt-1">
                                <span className="text-[10px] uppercase font-bold text-slate-500 tracking-widest">W{currentWeek} PRO</span>
                                <div className="h-1 w-1 rounded-full bg-slate-800"></div>
                                <span className="text-[10px] uppercase font-bold text-blue-400 tracking-widest">{profile.targetWeight}LB GOAL</span>
                            </div>
                        </div>
                        <button onClick={() => setShowSettings(true)} className="p-2 bg-slate-900 rounded-full border border-slate-800 active:scale-90 transition-transform shadow-xl"><Icon name="settings" size={20} /></button>
                    </header>

                    {view === 'home' && (
                        <div className="space-y-4 animate-in fade-in duration-300">
                            <div className="grid grid-cols-2 gap-2 mb-6">
                                {['squat', 'bench', 'deadlift', 'ohp'].map(l => (
                                    <div key={l} className="bg-slate-900/50 p-4 rounded-2xl border border-slate-800">
                                        <span className="text-[10px] uppercase text-slate-500 font-black block mb-1 tracking-widest">{l}</span>
                                        <span className="text-2xl font-black tracking-tight">{oneRMs[l]}<span className="text-xs ml-1 text-slate-600 font-black uppercase">LB</span></span>
                                    </div>
                                ))}
                            </div>
                            <h2 className="text-[10px] font-black text-slate-500 uppercase tracking-[0.3em] px-2 italic text-center">Training Protocol</h2>
                            <div className="space-y-3">
                                {BASE_PROGRAMS.map(p => (
                                    <button key={p.id} onClick={() => startWorkout(p)} className="w-full text-left bg-gradient-to-br from-slate-900 to-slate-950 p-6 rounded-[2.5rem] border border-slate-800 flex justify-between items-center group active:scale-[0.98] transition-all relative overflow-hidden shadow-xl">
                                        <div className="relative z-10">
                                            <span className="text-[9px] bg-blue-600/20 text-blue-400 border border-blue-500/30 px-2 py-0.5 rounded-full font-black uppercase tracking-widest">{p.focus}</span>
                                            <h3 className="text-xl font-black mt-1 italic uppercase tracking-tighter leading-none">{p.name}</h3>
                                        </div>
                                        <Icon name="play" size={24} className="text-blue-500 opacity-20 group-hover:opacity-100 transition-opacity" />
                                    </button>
                                ))}
                            </div>
                        </div>
                    )}

                    {view === 'nutrition' && (
                        <div className="space-y-8 animate-in fade-in duration-300 pb-10">
                            <div className="glass-card p-6 rounded-[2.5rem] shadow-2xl relative overflow-hidden">
                                <h2 className="text-[10px] font-black text-blue-400 uppercase tracking-[0.4em] mb-4 flex items-center gap-2"><Icon name="flame" size={12}/> Met Protocol</h2>
                                <div className="flex items-baseline gap-2 mb-6">
                                    <span className="text-5xl font-black italic tracking-tighter">{stats.calories}</span>
                                    <span className="text-xs font-black text-slate-600 uppercase tracking-widest leading-none">KCAL / DAY</span>
                                </div>
                                <button onClick={generateFuelPlan} disabled={isGenerating} className="w-full bg-blue-600 py-5 rounded-2xl font-black italic uppercase tracking-widest text-sm flex items-center justify-center gap-2 transition-all active:scale-95 disabled:bg-slate-800">
                                    {isGenerating ? <Icon name="loader-2" size={18} className="animate-spin" /> : <Icon name="sparkles" size={18} />}
                                    {isGenerating ? 'AI Reasoning...' : `Generate ${profile.store} Plan`}
                                </button>
                            </div>

                            {recipes.length > 0 && ['Breakfast', 'Lunch', 'Dinner', 'Snack'].map(category => {
                                const catRecipes = recipes.filter(r => r.category === category);
                                if (!catRecipes.length) return null;
                                return (
                                    <div key={category} className="space-y-4">
                                        <h2 className="text-[10px] font-black text-slate-500 uppercase tracking-[0.4em] px-2 italic">{category} Checklist</h2>
                                        {catRecipes.map(r => (
                                            <div key={r.id} className="bg-slate-900 border border-slate-800 p-6 rounded-[2.5rem] shadow-xl">
                                                <div className="flex justify-between items-start mb-4" onClick={() => setSelectedRecipe(r)}>
                                                    <div className="flex-1 pr-4">
                                                        <h4 className="font-black text-xl uppercase italic text-blue-400 leading-none tracking-tighter mb-2 underline decoration-blue-500/20">{r.title}</h4>
                                                        <span className="text-[9px] text-slate-500 font-bold uppercase tracking-widest">{r.macros}</span>
                                                    </div>
                                                    <div className="bg-slate-950 px-3 py-1 rounded-full border border-slate-800"><span className="text-[9px] font-black text-slate-400 italic uppercase">{r.frequency}X</span></div>
                                                </div>
                                                <div className="flex gap-2 flex-wrap mt-4 border-t border-slate-800/50 pt-5">
                                                    {r.checklist.map((checked, idx) => (
                                                        <button key={idx} onClick={() => toggleMealCheck(r.id, idx)} className={`w-11 h-11 rounded-2xl flex items-center justify-center transition-all ${checked ? 'bg-blue-600 text-white shadow-lg' : 'bg-slate-950 text-slate-700 border border-slate-800 shadow-inner'}`}>
                                                            {checked ? <Icon name="check" size={20} /> : <span className="text-[10px] font-black opacity-30 italic">#{idx + 1}</span>}
                                                        </button>
                                                    ))}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                );
                            })}

                            {groceryList.length > 0 && (
                                <div className="space-y-4">
                                    <div className="flex justify-between items-center px-2">
                                        <h2 className="text-[10px] font-black text-slate-500 uppercase tracking-[0.4em] italic">Grocery Manifest</h2>
                                        <span className="text-[10px] font-black text-green-500 bg-green-500/10 px-3 py-1 rounded-full border border-green-500/20">TOTAL: ${groceryTotal.toFixed(2)}</span>
                                    </div>
                                    <div className="bg-slate-900/40 p-2 rounded-[2.2rem] border border-slate-800 space-y-1">
                                        {groceryList.map(item => (
                                            <div key={item.id} onClick={() => toggleGrocery(item.id)} className={`flex items-center justify-between p-5 rounded-[2rem] border transition-all ${item.bought ? 'bg-slate-900/20 border-slate-950 opacity-30 shadow-none' : 'bg-slate-900 border-slate-800 shadow-lg'}`}>
                                                <div className="flex items-center gap-4">
                                                    <div className={`w-6 h-6 rounded-full border-2 flex items-center justify-center ${item.bought ? 'bg-green-500 border-green-500 shadow-lg' : 'border-slate-700'}`}>
                                                        {item.bought && <Icon name="check" size={14} className="text-black font-black"/>}
                                                    </div>
                                                    <div>
                                                        <h4 className="font-black text-sm uppercase italic tracking-tight mb-1 leading-none">{item.item}</h4>
                                                        <span className="text-[9px] text-slate-500 font-bold uppercase tracking-widest">{item.qty} • {item.category}</span>
                                                    </div>
                                                </div>
                                                {!item.bought && item.estPrice && <span className="text-[10px] font-black text-green-500">${item.estPrice.toFixed(2)}</span>}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </div>
                    )}

                    {view === 'history' && (
                        <div className="space-y-4 animate-in fade-in duration-300">
                            <h2 className="text-[10px] font-black text-slate-500 uppercase tracking-[0.3em] px-2 italic">Intel Logs</h2>
                            {history.length === 0 ? <p className="p-12 text-center text-slate-700 font-black uppercase italic tracking-widest text-xs border border-dashed border-slate-800 rounded-3xl">No Logs Recorded.</p> : history.map(h => (
                                <div key={h.id} className="bg-slate-900/60 p-6 rounded-[2rem] border border-slate-800 mb-4 shadow-lg">
                                    <h4 className="font-black italic uppercase text-blue-400 tracking-tighter text-lg leading-tight">{h.name}</h4>
                                    <p className="text-[10px] text-slate-500 font-bold uppercase tracking-widest">{h.date} • Week {h.week}</p>
                                </div>
                            ))}
                        </div>
                    )}

                    {view === 'active' && activeWorkout && (
                        <div className="space-y-6 pb-24">
                            <div className="flex justify-between items-center sticky top-[80px] z-30 bg-black/95 py-4 backdrop-blur-md px-2">
                                <h2 className="text-xl font-black italic uppercase tracking-tighter">{activeWorkout.name}</h2>
                                <button onClick={() => setView('home')} className="text-red-500 text-[9px] font-black uppercase tracking-widest bg-red-500/10 px-3 py-1.5 rounded-full">Abort</button>
                            </div>
                            {activeWorkout.exercises.map((ex, exIdx) => (
                                <div key={exIdx} className="bg-slate-900 rounded-[2.5rem] border border-slate-800 overflow-hidden shadow-2xl">
                                    <div className="p-5 bg-slate-800/40 border-b border-slate-800 flex justify-between items-start">
                                        <h3 className="font-black italic uppercase text-sm tracking-tight">{ex.name}</h3>
                                        <span className={`text-[9px] font-black uppercase px-2 py-0.5 rounded-full ${ex.type === 'cardio' ? 'bg-green-500/10 text-green-500' : 'bg-slate-950/50 text-slate-500'}`}>{ex.type}</span>
                                    </div>
                                    <div className="p-3 space-y-1.5">
                                        {ex.sets.map((s, si) => (
                                            <div key={si} className={`flex items-center gap-3 p-4 rounded-[1.8rem] transition-all ${s.completed ? 'opacity-30 bg-blue-500/5' : 'bg-slate-950/40 border border-slate-800/50'}`}>
                                                <div className="flex-1 flex items-center gap-4">
                                                    <span className="text-[10px] font-black text-slate-700 italic">#{si+1}</span>
                                                    <div className="flex flex-col gap-0.5">
                                                        <div className="flex items-baseline gap-1">
                                                            <input type="number" value={s.weight} onChange={(e) => handleWeightChange(exIdx, si, e.target.value)} className="text-3xl font-black tracking-tighter leading-none w-20 input-focus-effect" />
                                                            <span className="text-[10px] text-slate-600 font-black uppercase tracking-tighter">LB</span>
                                                        </div>
                                                        <span className="text-[9px] font-black text-slate-500 uppercase tracking-tighter">Target: {s.reps} Reps</span>
                                                    </div>
                                                </div>
                                                <button onClick={() => toggleSet(exIdx, si)} className={`w-14 h-14 rounded-2xl flex items-center justify-center border transition-all ${s.completed ? 'bg-blue-600 border-blue-600 shadow-xl shadow-blue-500/40' : 'bg-slate-800 border-slate-700 text-slate-500'}`}><Icon name="check-circle-2" size={28} /></button>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            ))}
                            <button onClick={finishWorkout} className="w-full bg-blue-600 py-6 rounded-[2.5rem] font-black italic text-xl tracking-tighter shadow-2xl active:scale-95 transition-all uppercase mb-10">FINISH SESSION</button>
                        </div>
                    )}

                    {selectedRecipe && (
                        <div className="fixed inset-0 bg-black/95 z-[200] p-6 backdrop-blur-xl flex flex-col items-center justify-center">
                            <div className="w-full max-w-md bg-slate-900 border border-slate-800 rounded-[2.5rem] p-8 overflow-y-auto max-h-[80vh] custom-scroll relative">
                                <button onClick={() => setSelectedRecipe(null)} className="absolute top-6 right-6 p-2 bg-slate-800 rounded-full"><Icon name="x" size={20}/></button>
                                <h3 className="text-2xl font-black italic text-blue-500 uppercase leading-none tracking-tighter mb-4 pr-10">{selectedRecipe.title}</h3>
                                <p className="text-slate-400 text-xs mb-6 uppercase font-bold tracking-widest leading-relaxed italic">{selectedRecipe.description}</p>
                                <div className="bg-slate-950 p-6 rounded-3xl border border-slate-800 mb-6">
                                    <h5 className="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-4 flex items-center gap-2"><Icon name="list" size={10}/> Weekly Prep</h5>
                                    <ul className="space-y-4">
                                        {selectedRecipe.instructions.map((step, i) => (
                                            <li key={i} className="text-sm font-medium text-slate-200 flex gap-4 leading-snug">
                                                <span className="text-blue-500 font-black italic">{i+1}</span> {step}
                                            </li>
                                        ))}
                                    </ul>
                                </div>
                                <div className="text-center font-black italic text-green-500 uppercase tracking-[0.2em] text-[10px] py-4 bg-green-500/5 rounded-2xl border border-green-500/10">
                                    Protocol: {selectedRecipe.macros}
                                </div>
                            </div>
                        </div>
                    )}

                    {showSettings && (
                        <div className="fixed inset-0 bg-black/98 z-[100] p-6 backdrop-blur-3xl overflow-y-auto">
                            <div className="max-w-md mx-auto pb-20 pt-10 px-2">
                                <div className="flex justify-between items-center mb-12">
                                    <h2 className="text-2xl font-black italic uppercase underline decoration-blue-500 decoration-8 underline-offset-8 tracking-tighter">Pro Config</h2>
                                    <button onClick={()=>setShowSettings(false)} className="bg-slate-900 p-2 rounded-full border border-slate-800 shadow-xl"><Icon name="x" size={24}/></button>
                                </div>
                                <section className="space-y-12">
                                    <div className="space-y-6">
                                        <label className="text-[10px] font-black uppercase text-slate-500 tracking-[0.4em] mb-2 block italic px-1">AI Intelligence Key</label>
                                        <div className="bg-slate-900 p-6 rounded-[2rem] border border-slate-800 space-y-4 shadow-xl">
                                            <input 
                                                type="password" 
                                                placeholder="Paste Gemini API Key" 
                                                value={profile.userApiKey} 
                                                onChange={(e) => setProfile({...profile, userApiKey: e.target.value})} 
                                                className="w-full bg-black border border-slate-800 rounded-xl p-4 font-mono text-xs text-blue-400 placeholder:text-slate-800 shadow-inner"
                                            />
                                            <p className="text-[8px] text-slate-600 uppercase font-black tracking-widest text-center">Stores locally. Safe for GitHub Pages.</p>
                                        </div>
                                    </div>
                                    <div className="space-y-6">
                                        <label className="text-[10px] font-black uppercase text-slate-500 tracking-[0.4em] mb-2 block italic px-1">Performance Protocol</label>
                                        <div className="bg-slate-900 p-6 rounded-[2rem] border border-slate-800 space-y-5 shadow-2xl">
                                            <div className="grid grid-cols-2 gap-4">
                                                <div>
                                                    <span className="text-[9px] font-black text-slate-600 uppercase block mb-1 tracking-widest">Weight (lb)</span>
                                                    <input type="number" value={profile.weight} onChange={(e)=>setProfile({...profile, weight: parseInt(e.target.value)||0})} className="w-full bg-black border border-slate-800 rounded-2xl p-4 font-black text-white text-xl" />
                                                </div>
                                                <div>
                                                    <span className="text-[9px] font-black text-blue-500 uppercase block mb-1 tracking-widest">Target (lb)</span>
                                                    <input type="number" value={profile.targetWeight} onChange={(e)=>setProfile({...profile, targetWeight: parseInt(e.target.value)||0})} className="w-full bg-black border border-slate-800 rounded-2xl p-4 font-black text-white text-xl shadow-[0_0_15px_rgba(59,130,246,0.1)]" />
                                                </div>
                                            </div>
                                            <div className="flex justify-between items-center bg-black/50 p-4 rounded-2xl border border-slate-800">
                                                <span className="text-xs font-black uppercase text-slate-500 tracking-widest">Store</span>
                                                <select value={profile.store} onChange={(e) => setProfile({...profile, store: e.target.value})} className="font-black italic uppercase text-green-500 text-sm outline-none">
                                                    <option value="Walmart">Walmart</option>
                                                    <option value="Costco">Costco</option>
                                                    <option value="Aldi">Aldi</option>
                                                </select>
                                            </div>
                                            <div className="flex justify-between items-center bg-black/50 p-4 rounded-2xl border border-slate-800">
                                                <span className="text-xs font-black uppercase text-slate-500 tracking-widest">Weekly Budget</span>
                                                <div className="flex items-center gap-2">
                                                    <span className="text-green-500 font-black">$</span>
                                                    <input type="number" value={profile.weeklyBudget} onChange={(e)=>setProfile({...profile, weeklyBudget: parseInt(e.target.value)||0})} className="w-16 text-right font-black text-lg" />
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="space-y-6">
                                        <label className="text-[10px] font-black uppercase text-slate-500 tracking-[0.4em] block italic px-1 mb-6">Lift Benchmarks</label>
                                        <div className="space-y-3">
                                            {Object.keys(oneRMs).map(l=>(
                                                <div key={l} className="flex justify-between items-center bg-slate-900 p-5 rounded-3xl border border-slate-800 shadow-inner">
                                                    <span className="text-xs font-black uppercase text-slate-500 italic tracking-widest">{l}</span>
                                                    <input type="number" value={oneRMs[l]} onChange={(e)=>setOneRMs({...oneRMs, [l]: parseInt(e.target.value)||0})} className="bg-black border border-slate-700 rounded-xl p-3 w-24 text-right font-bold text-blue-400" />
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    <button onClick={()=>{if(window.confirm("Nuclear Reset?")) {localStorage.clear(); window.location.reload();}}} className="w-full py-5 text-red-500 text-[10px] font-black uppercase tracking-widest border border-red-500/20 rounded-3xl mt-12 active:bg-red-500 active:text-white transition-all shadow-lg">Clear All Data</button>
                                </section>
                            </div>
                        </div>
                    )}

                    {timer > 0 && (
                        <div className="fixed bottom-24 left-1/2 -translate-x-1/2 bg-blue-600 px-6 py-4 rounded-full flex items-center gap-4 shadow-2xl z-50 animate-pulse border border-blue-400 ring-4 ring-blue-600/20">
                            <Icon name="timer" size={20} />
                            <span className="font-mono font-black text-2xl italic leading-none">{Math.floor(timer/60)}:{(timer%60).toString().padStart(2,'0')}</span>
                            <button onClick={()=>setTimer(0)} className="bg-blue-700 rounded-full p-1 active:scale-75"><Icon name="x" size={16} /></button>
                        </div>
                    )}

                    <nav className="fixed bottom-0 left-0 right-0 bg-black/95 backdrop-blur-xl border-t border-slate-900 p-4 flex justify-around items-center pb-safe z-40 shadow-[0_-10px_40px_rgba(0,0,0,0.8)] px-8">
                        <button onClick={() => setView('home')} className={`flex flex-col items-center gap-1 transition-all active:scale-90 ${view === 'home' ? 'text-blue-500' : 'text-slate-700'}`}>
                            <Icon name="dumbbell" size={22} />
                            <span className="text-[9px] font-black uppercase italic tracking-widest">Train</span>
                        </button>
                        <button onClick={() => setView('nutrition')} className={`flex flex-col items-center gap-1 transition-all active:scale-90 ${view === 'nutrition' ? 'text-green-500' : 'text-slate-700'}`}>
                            <Icon name="refrigerator" size={22} />
                            <span className="text-[9px] font-black uppercase italic tracking-widest">Fuel</span>
                        </button>
                        <button onClick={() => setView('history')} className={`flex flex-col items-center gap-1 transition-all active:scale-90 ${view === 'history' ? 'text-blue-500' : 'text-slate-700'}`}>
                            <Icon name="history" size={22} />
                            <span className="text-[9px] font-black uppercase italic tracking-widest">Intel</span>
                        </button>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
