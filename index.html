
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Iron Blueprint | Pro</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; background-color: black; color: white; }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
        input[type="number"], input[type="text"], input[type="password"], select { -moz-appearance: textfield; background: transparent; border: none; outline: none; color: white; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .input-focus-effect:focus { border-bottom: 2px solid #3b82f6; }
        .glass-card { background: rgba(30, 41, 59, 0.4); border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .slide-up { animation: slideUp 0.3s ease-out forwards; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body class="bg-black">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // Safe Icon rendering to prevent React DOM crashes on mobile
        const Icon = ({ name, size = 24, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current && window.lucide) {
                    iconRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    window.lucide.createIcons({
                        root: iconRef.current,
                        attrs: { width: size, height: size, class: className }
                    });
                }
            }, [name, size, className]);
            return <span ref={iconRef} className="inline-flex items-center justify-center"></span>;
        };

        const STORAGE_KEY = 'iron_blueprint_react_v6';

        const BARBELL_LOADS = {
            45: [], 65: [10], 95: [25], 115: [35], 135: [45],
            155: [45, 10], 165: [35, 25], 185: [45, 25], 205: [45, 35],
            225: [45, 45], 245: [45, 45, 10], 255: [45, 35, 25],
            275: [45, 45, 25], 295: [45, 45, 35], 315: [45, 45, 35, 10],
            345: [45, 45, 35, 25], 365: [45, 45, 35, 25, 10]
        };

        const EXERCISE_ALTERNATIVES = {
            'bench': [{id:'db_bench', name:'DB Bench Press'}, {id:'machine_press', name:'Machine Chest Press'}],
            'squat': [{id:'front_squat', name:'Front Squat'}, {id:'leg_press', name:'Leg Press'}],
            'deadlift': [{id:'sumo_dl', name:'Sumo Deadlift'}, {id:'trap_bar_dl', name:'Trap Bar Deadlift'}],
            'ohp': [{id:'db_shoulder_press', name:'DB Shoulder Press'}, {id:'machine_shoulder', name:'Machine Shoulder'}],
            'rows': [{id:'db_row', name:'DB Row'}, {id:'cable_row', name:'Seated Cable Row'}],
            'incline_db': [{id:'incline_bb', name:'Incline BB Press'}, {id:'pec_deck', name:'Pec Deck Flyes'}],
            'curls': [{id:'cable_curls', name:'Cable Curls'}, {id:'bb_curls', name:'BB Bicep Curls'}],
            'triceps': [{id:'tricep_pushdown', name:'Cable Pushdowns'}, {id:'dips', name:'Dips'}]
        };

        const getWeekScheme = (weekNum, type) => {
            const schemes = {
                1: { primary: { reps: [12, 10, 10, 8], rpe: [6.5, 7, 7.5, 8] }, accessory: { sets: 4, reps: 12 } },
                2: { primary: { reps: [8, 6, 6, 4], rpe: [7, 8, 8.5, 9] }, accessory: { sets: 4, reps: 10 } },
                3: { primary: { reps: [5, 3, 2, 1], rpe: [8.5, 9, 9.5, 10] }, accessory: { sets: 3, reps: 8 } },
                4: { primary: { reps: [10, 10, 10], rpe: [5, 5, 5] }, accessory: { sets: 2, reps: 12 } }
            };
            return schemes[weekNum] ? schemes[weekNum][type] : schemes[1][type];
        };

        // Safe Audio Beep System
        const playBeep = () => {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gainNode = ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, ctx.currentTime);
                gainNode.gain.setValueAtTime(0.5, ctx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
                osc.connect(gainNode);
                gainNode.connect(ctx.destination);
                osc.start();
                osc.stop(ctx.currentTime + 0.5);
            } catch (e) { console.log("Audio not supported yet."); }
        };

        function App() {
            const [view, setView] = useState('home');
            const [hasOnboarded, setHasOnboarded] = useState(false);
            const [onboardingStep, setOnboardingStep] = useState(1);
            
            // Core States
            const [programs, setPrograms] = useState([]);
            const [oneRMs, setOneRMs] = useState({ squat: 225, bench: 185, deadlift: 315, ohp: 135, rows: 155 });
            const [history, setHistory] = useState([]);
            const [currentWeek, setCurrentWeek] = useState(1);
            
            const [activeWorkout, setActiveWorkout] = useState(null);
            const [workoutStartTime, setWorkoutStartTime] = useState(null);
            const [timer, setTimer] = useState(0);
            
            const [showSettings, setShowSettings] = useState(false);
            const [errorMsg, setErrorMsg] = useState(null);
            
            // Modals
            const [historyModal, setHistoryModal] = useState(null);
            const [swapModal, setSwapModal] = useState(null); 
            const [selectedRecipe, setSelectedRecipe] = useState(null);
            const [abortModal, setAbortModal] = useState(false);
            const [resetModal, setResetModal] = useState(false);
            const [resetPlanModal, setResetPlanModal] = useState(false);
            const [fuelUpdateModal, setFuelUpdateModal] = useState(false);

            // AI Oracle State
            const [showAiChat, setShowAiChat] = useState(false);
            const [aiInput, setAiInput] = useState("");
            const [aiHistory, setAiHistory] = useState([{role: 'ai', text: "I am Iron Oracle. I can adjust your benchmarks, your profile, or rewrite your entire workout program (like adding warmups or cardio). What do you need?", action: null}]);
            const [isAiTyping, setIsAiTyping] = useState(false);

            const [profile, setProfile] = useState({
                weight: 195,
                height: 70,
                age: 34,
                targetWeight: 205,
                store: 'Walmart',
                weeklyBudget: 120,
                userApiKey: "", 
                aiModel: "gemini-2.5-flash",
                gymMember: true,
                equipment: "",
                goals: "",
                programStyle: ""
            });

            const [groceryList, setGroceryList] = useState([]);
            const [recipes, setRecipes] = useState([]);
            const [isGeneratingPlan, setIsGeneratingPlan] = useState(false);
            const [copied, setCopied] = useState(false);

            // Load Data
            useEffect(() => {
                try {
                    const saved = localStorage.getItem(STORAGE_KEY);
                    if (saved) {
                        const parsed = JSON.parse(saved);
                        if (parsed.programs) setPrograms(parsed.programs);
                        if (parsed.oneRMs) setOneRMs(parsed.oneRMs);
                        if (parsed.history) setHistory(parsed.history);
                        if (parsed.currentWeek) setCurrentWeek(parsed.currentWeek);
                        if (parsed.profile) setProfile(prev => ({...prev, ...parsed.profile}));
                        if (parsed.groceryList) setGroceryList(parsed.groceryList);
                        if (parsed.recipes) setRecipes(parsed.recipes);
                        if (parsed.hasOnboarded) {
                            setHasOnboarded(true);
                        } else {
                            setView('onboarding');
                        }
                    } else {
                        setView('onboarding');
                    }
                } catch(e) { 
                    console.error("Storage Load Error"); 
                    setView('onboarding');
                }
            }, []);

            // Save Data
            useEffect(() => {
                localStorage.setItem(STORAGE_KEY, JSON.stringify({ programs, oneRMs, history, currentWeek, profile, groceryList, recipes, hasOnboarded }));
            }, [programs, oneRMs, history, currentWeek, profile, groceryList, recipes, hasOnboarded]);

            // Timer Hook
            useEffect(() => {
                let interval;
                if (timer > 0) {
                    interval = setInterval(() => {
                        setTimer(prev => {
                            if (prev === 1) playBeep();
                            return prev - 1;
                        });
                    }, 1000);
                }
                return () => clearInterval(interval);
            }, [timer]);

            const roundToEquipment = (weight, isDB = false) => {
                if (isDB) return Math.round(Math.min(90, Math.max(5, weight)) / 5) * 5;
                const p = Object.keys(BARBELL_LOADS).map(Number);
                return p.reduce((a, b) => Math.abs(b - weight) < Math.abs(a - weight) ? b : a);
            };

            // ---- ONBOARDING AI GENERATOR ----
            const [isGeneratingProgram, setIsGeneratingProgram] = useState(false);
            
            const generateCustomWorkout = async () => {
                if (!profile.userApiKey) {
                    setErrorMsg("API Key required to generate custom protocol.");
                    setTimeout(() => setErrorMsg(null), 4000);
                    return;
                }
                setIsGeneratingProgram(true);

                const sysPrompt = `You are an elite strength and conditioning AI coach.
                Task: Build a custom weekly workout program based on the user's profile.
                User: Age ${profile.age}, Current Weight: ${profile.weight}lb, Goal Weight: ${profile.targetWeight}lb.
                Goals: ${profile.goals || "General Strength & Hypertrophy"}.
                Preferred Program Style: ${profile.programStyle || "Balanced Split"}.
                Equipment Access: ${profile.gymMember ? "Full Commercial Gym Access (Assume all machines/barbells available)" : "Home/Limited Equipment: " + profile.equipment}.
                Current 1RMs: Squat ${oneRMs.squat}lb, Bench ${oneRMs.bench}lb, Deadlift ${oneRMs.deadlift}lb, OHP ${oneRMs.ohp}lb, Rows ${oneRMs.rows}lb.

                RULES:
                1. Output ONLY a valid JSON object containing an array of daily workouts. Do not wrap in markdown (like \`\`\`json).
                2. Structure must be:
                {
                    "programs": [
                        {
                            "id": "day1", 
                            "name": "Push Day", 
                            "focus": "Hypertrophy", 
                            "exercises": [
                                {"id": "bench", "name": "BB Bench Press", "type": "primary"}, 
                                {"id": "db_flys", "name": "DB Flys", "type": "accessory", "sets": 4, "reps": 12},
                                {"id": "treadmill", "name": "Incline Walk", "type": "cardio", "sets": 1, "reps": "20m"}
                            ]
                        }
                    ]
                }
                3. "type" MUST be exactly one of: "primary", "accessory", or "cardio". 
                4. Primary exercises automatically receive periodized scaling, DO NOT specify sets/reps for primary.
                5. Accessory and cardio MUST have "sets" and "reps" specified ("reps" for cardio is usually duration like "15m").`;

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${profile.aiModel}:generateContent?key=${profile.userApiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: "Generate my custom training protocol." }] }],
                            systemInstruction: { parts: [{ text: sysPrompt }] },
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });
                    
                    if (!response.ok) throw new Error("API Auth Error. Check Key.");
                    
                    const result = await response.json();
                    let textResult = result.candidates[0].content.parts[0].text;
                    const jsonMatch = textResult.match(/\{[\s\S]*\}/);
                    if (!jsonMatch) throw new Error("AI Format Error");
                    
                    const data = JSON.parse(jsonMatch[0]);
                    if (data.programs && data.programs.length > 0) {
                        setPrograms(data.programs);
                        setHasOnboarded(true);
                        setView('home');
                        setCurrentWeek(1);
                        setHistory([]);
                    } else {
                        throw new Error("No programs generated.");
                    }
                } catch (err) {
                    setErrorMsg(`Generation Error: ${err.message}`);
                    setTimeout(() => setErrorMsg(null), 5000);
                } finally {
                    setIsGeneratingProgram(false);
                }
            };


            // ---- WORKOUT LOGIC ----
            const startWorkout = (prog) => {
                const session = {
                    id: prog.id,
                    instanceId: Date.now(),
                    name: prog.name,
                    week: currentWeek,
                    exercises: prog.exercises.map(ex => {
                        if (ex.type === 'cardio') return { ...ex, sets: [{ weight: 0, reps: ex.reps || "15m", completed: false }] };
                        
                        const scheme = getWeekScheme(currentWeek, ex.type);
                        const setsCount = ex.type === 'primary' ? scheme.reps.length : (ex.sets || scheme.sets || 3);
                        const sets = Array.from({ length: setsCount }).map((_, i) => {
                            let targetWeight = 0;
                            let targetReps = ex.type === 'primary' ? scheme.reps[i] : (ex.reps || scheme.reps || 10);
                            
                            if (ex.type === 'primary') {
                                targetWeight = roundToEquipment((oneRMs[ex.id] || 100) * (scheme.rpe[i] / 10) * (1.0278 - 0.0278 * targetReps));
                            } else {
                                const allEx = history.reduce((acc, h) => acc.concat(h.exercises), []);
                                const last = [...allEx].reverse().find(e => e.id === ex.id);
                                targetWeight = roundToEquipment(last ? Number(last.sets[0].weight) + 5 : 25, true);
                            }
                            return { weight: targetWeight, reps: targetReps, completed: false };
                        });
                        return { ...ex, sets };
                    })
                };
                setActiveWorkout(session);
                setWorkoutStartTime(Date.now());
                setView('active');
            };

            const handleWeightChange = (exIdx, setIdx, newVal) => {
                const newWorkout = { ...activeWorkout };
                const weight = parseInt(newVal) || 0;
                const diff = weight - newWorkout.exercises[exIdx].sets[setIdx].weight;
                newWorkout.exercises[exIdx].sets[setIdx].weight = weight;
                // Cascade down
                for (let i = setIdx + 1; i < newWorkout.exercises[exIdx].sets.length; i++) {
                    if (!newWorkout.exercises[exIdx].sets[i].completed) {
                        newWorkout.exercises[exIdx].sets[i].weight = roundToEquipment(newWorkout.exercises[exIdx].sets[i].weight + diff, newWorkout.exercises[exIdx].type === 'accessory');
                    }
                }
                setActiveWorkout(newWorkout);
            };

            const handleRepChange = (exIdx, setIdx, newVal) => {
                const newWorkout = { ...activeWorkout };
                newWorkout.exercises[exIdx].sets[setIdx].reps = newVal;
                setActiveWorkout(newWorkout);
            };

            const toggleSet = (exIdx, setIdx) => {
                const newWorkout = { ...activeWorkout };
                newWorkout.exercises[exIdx].sets[setIdx].completed = !newWorkout.exercises[exIdx].sets[setIdx].completed;
                if (newWorkout.exercises[exIdx].sets[setIdx].completed) {
                    setTimer(90);
                    const AudioContext = window.AudioContext || window.webkitAudioContext;
                    if(AudioContext) { const tempCtx = new AudioContext(); tempCtx.resume(); }
                }
                setActiveWorkout(newWorkout);
            };

            const addSet = (exIdx) => {
                const newWorkout = { ...activeWorkout };
                const sets = newWorkout.exercises[exIdx].sets;
                const lastSet = sets[sets.length - 1] || { weight: 45, reps: 10 };
                sets.push({ weight: lastSet.weight, reps: lastSet.reps, completed: false });
                setActiveWorkout(newWorkout);
            };

            const applySwap = (exIdx, newId, newName) => {
                const newWorkout = { ...activeWorkout };
                newWorkout.exercises[exIdx].id = newId;
                newWorkout.exercises[exIdx].name = newName;
                setSwapModal(null);
                setActiveWorkout(newWorkout);
            };

            const finishWorkout = () => {
                const updated1RMs = { ...oneRMs };
                activeWorkout.exercises.forEach(ex => {
                    if (ex.type === 'primary') {
                        const comp = ex.sets.filter(s => s.completed);
                        if (comp.length) {
                            const best = comp.reduce((p, c) => (Number(c.weight) > Number(p.weight)) ? c : p);
                            const e1rm = Math.round(Number(best.weight) / (1.0278 - 0.0278 * Number(best.reps)));
                            if (e1rm > (oneRMs[ex.id] || 0)) updated1RMs[ex.id] = e1rm;
                        }
                    }
                });
                const duration = workoutStartTime ? Math.round((Date.now() - workoutStartTime) / 60000) : 0;
                const finalizedWorkout = {...activeWorkout, date: new Date().toLocaleDateString(), duration: duration};
                
                const newHistory = [finalizedWorkout, ...history];
                setHistory(newHistory);
                setOneRMs(updated1RMs);
                
                const thisWeekLogs = newHistory.filter(h => h.week === currentWeek);
                if (thisWeekLogs.length >= programs.length && programs.length > 0) setCurrentWeek(prev => prev === 4 ? 1 : prev + 1);
                
                setActiveWorkout(null);
                setWorkoutStartTime(null);
                setView('home');
            };

            // ---- NUTRITION LOGIC ----
            const stats = useMemo(() => {
                const weightKg = profile.weight * 0.453592;
                const heightCm = profile.height * 2.54;
                const bmr = (10 * weightKg) + (6.25 * heightCm) - (5 * profile.age) + 5;
                const tdee = bmr * 1.725;
                let targetCals = tdee;
                if (profile.targetWeight > profile.weight) targetCals += 400;
                if (profile.targetWeight < profile.weight) targetCals -= 400;
                return {
                    calories: Math.round(targetCals),
                    bmi: ((profile.weight / (profile.height * profile.height)) * 703).toFixed(1),
                    protein: Math.round(profile.weight * 1.1),
                    fats: Math.round(profile.weight * 0.4),
                    carbs: Math.round((targetCals - (profile.weight * 1.1 * 4) - (profile.weight * 0.4 * 9)) / 4)
                };
            }, [profile]);

            const groceryTotal = useMemo(() => {
                return groceryList.reduce((sum, item) => sum + (Number(item.estPrice) || 0), 0);
            }, [groceryList]);

            const executeFuelPlanGeneration = async () => {
                setFuelUpdateModal(false);
                setIsGeneratingPlan(true);
                const systemPrompt = `You are an elite nutritionist.
                    Create a 7-day grocery list and meal plan for ${profile.store}.
                    Target: ${stats.calories} kcal/day for athlete moving from ${profile.weight}lb to ${profile.targetWeight}lb. Budget: $${profile.weeklyBudget}.
                    Return ONLY raw JSON, no markdown formatting.
                    {
                      "groceries": [{"id": 1, "item": "item", "category": "Protein|Carb|Fat", "qty": "qty", "estPrice": 0.00}],
                      "recipes": [{"id": 1, "category": "Breakfast|Lunch|Dinner|Snack", "title": "name", "description": "desc", "instructions": ["s1"], "macros": "macro", "frequency": 7}]
                    }`;

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${profile.aiModel}:generateContent?key=${profile.userApiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: `Create plan for ${profile.store} at $${profile.weeklyBudget}` }] }],
                            systemInstruction: { parts: [{ text: systemPrompt }] },
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });
                    
                    if (!response.ok) throw new Error("API Connection Error");
                    const result = await response.json();
                    let textResult = result.candidates[0].content.parts[0].text;
                    const jsonMatch = textResult.match(/\{[\s\S]*\}/);
                    if (!jsonMatch) throw new Error("Format Error");
                    
                    const data = JSON.parse(jsonMatch[0]);
                    setGroceryList(data.groceries.map(g => ({ ...g, bought: false })));
                    setRecipes(data.recipes.map(r => ({ ...r, checklist: Array(r.frequency).fill(false) })));
                } catch (err) {
                    setErrorMsg(`Sync Error: Check Key/Network.`);
                    setTimeout(() => setErrorMsg(null), 5000);
                } finally {
                    setIsGeneratingPlan(false);
                }
            };

            const handleFuelGenRequest = () => {
                if (!profile.userApiKey) {
                    setErrorMsg("Add API Key in Settings to generate.");
                    setTimeout(() => setErrorMsg(null), 4000); 
                    return;
                }
                setFuelUpdateModal(true); // Open pre-flight check
            };

            const toggleMealCheck = (recipeId, index) => {
                setRecipes(recipes.map(r => r.id === recipeId ? { ...r, checklist: r.checklist.map((c,i)=> i===index ? !c : c) } : r));
            };

            const toggleGrocery = (id) => {
                setGroceryList(groceryList.map(item => item.id === id ? { ...item, bought: !item.bought } : item));
            };

            const copyFuelPlan = () => {
                let text = `🔥 IRON BLUEPRINT FUEL PLAN 🔥\n\n`;
                text += `=== GROCERY MANIFEST (EST: $${groceryTotal.toFixed(2)}) ===\n`;
                if (groceryList.length === 0) text += `No groceries found.\n`;
                groceryList.forEach(item => {
                    text += `- [${item.bought ? 'X' : ' '}] ${item.item} (${item.qty}) - ${item.category}\n`;
                });

                text += `\n=== PERFORMANCE RECIPES ===\n`;
                if (recipes.length === 0) text += `No recipes found.\n`;
                recipes.forEach(r => {
                    text += `\n🍽️ ${r.title} (${r.frequency}x Weekly)\n`;
                    text += `Protocol: ${r.category}\n`;
                    text += `Targets: ${r.macros}\n`;
                    text += `Prep:\n`;
                    r.instructions.forEach((step, i) => {
                        text += `  ${i+1}. ${step}\n`;
                    });
                });

                const textArea = document.createElement("textarea");
                textArea.value = text;
                textArea.style.position = "fixed";
                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();
                try {
                    document.execCommand('copy');
                    setCopied(true);
                    setTimeout(() => setCopied(false), 2000);
                } catch (err) {
                    setErrorMsg("Clipboard access denied by browser.");
                    setTimeout(() => setErrorMsg(null), 3000);
                }
                document.body.removeChild(textArea);
            };

            // ---- GLOBAL AI ORACLE ----
            const sendAiMessage = async () => {
                if (!aiInput.trim()) return;
                if (!profile.userApiKey) {
                    setAiHistory(prev => [...prev, {role:'user', text: aiInput}, {role:'ai', text: "Please enter your API Key in settings first.", action: null}]);
                    setAiInput(""); return;
                }

                const currentInput = aiInput;
                setAiHistory(prev => [...prev, {role: 'user', text: currentInput}]);
                setAiInput("");
                setIsAiTyping(true);

                const sysPrompt = `You are Iron Oracle, AI assistant.
                State: Profile (Weight ${profile.weight}, Target ${profile.targetWeight}, Budget $${profile.weeklyBudget}). 1RMs: ${JSON.stringify(oneRMs)}.
                Current Workout Programs: ${JSON.stringify(programs)}.
                Current Groceries: ${JSON.stringify(groceryList)}.
                Current Recipes: ${JSON.stringify(recipes)}.

                Analyze request. You can propose setting adjustments, modify the workout program structure, OR adjust the grocery list and recipes.
                If the user asks to add warmups, cardio, or new exercises, rewrite the Current Workout Programs array appropriately and use UPDATE_PROGRAMS.
                If the user asks to change foods, swap ingredients, or adjust meals, rewrite the Current Groceries and Current Recipes arrays appropriately and use UPDATE_NUTRITION. Ensure groceries have "bought": false and recipes have "checklist": [array of false booleans matching frequency].
                
                Output ONLY valid JSON, no markdown wrappers:
                {
                    "reply": "Your response",
                    "action": null OR {
                        "type": "UPDATE_1RM" | "UPDATE_PROFILE" | "UPDATE_PROGRAMS" | "UPDATE_NUTRITION",
                        "payload": {"key": "bench", "value": 225} OR [array of rewritten programs] OR {"groceries": [array of new groceries], "recipes": [array of new recipes]},
                        "pros": ["Benefit 1"],
                        "cons": ["Drawback 1"]
                    }
                }`;

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${profile.aiModel}:generateContent?key=${profile.userApiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: currentInput }] }],
                            systemInstruction: { parts: [{ text: sysPrompt }] },
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });

                    const result = await response.json();
                    const textResult = result.candidates[0].content.parts[0].text;
                    const jsonMatch = textResult.match(/\{[\s\S]*\}/);
                    const data = JSON.parse(jsonMatch[0]);

                    setAiHistory(prev => [...prev, {role: 'ai', text: data.reply, action: data.action}]);
                } catch (e) {
                    setAiHistory(prev => [...prev, {role: 'ai', text: "Network interference detected.", action: null}]);
                } finally {
                    setIsAiTyping(false);
                }
            };

            const applyAiAction = (action, idx) => {
                if (action.type === 'UPDATE_1RM') {
                    setOneRMs(prev => ({...prev, [action.payload.key]: action.payload.value}));
                } else if (action.type === 'UPDATE_PROFILE') {
                    setProfile(prev => ({...prev, [action.payload.key]: action.payload.value}));
                } else if (action.type === 'UPDATE_PROGRAMS') {
                    setPrograms(action.payload);
                } else if (action.type === 'UPDATE_NUTRITION') {
                    setGroceryList(action.payload.groceries);
                    setRecipes(action.payload.recipes);
                }
                setAiHistory(prev => prev.map((msg, i) => i === idx ? {...msg, action: {...msg.action, resolved: true}} : msg));
            };

            const isWorkoutCompletedThisWeek = (progId) => {
                return history.find(h => h.id === progId && h.week === currentWeek);

                        <div className="fixed inset-0 bg-black/95 backdrop-blur-xl z-[400] p-6 flex flex-col items-center justify-center">
                            <div className="bg-slate-900 border border-slate-800 rounded-3xl p-6 max-w-sm w-full text-center shadow-2xl">
                                <div className="w-16 h-16 bg-red-500/10 text-red-500 rounded-full flex items-center justify-center mx-auto mb-4">
                                    <Icon name="skull" size={32} />
                                </div>
                                <h3 className="text-xl font-black uppercase italic text-white tracking-tighter mb-2">Nuclear Reset</h3>
                                <p className="text-slate-400 text-xs font-bold mb-6">This will wipe all 1RMs, history, and training blocks. Cannot be undone.</p>
                                <div className="flex gap-3">
                                    <button onClick={() => setResetModal(false)} className="flex-1 py-3 rounded-xl font-black text-[10px] uppercase tracking-widest bg-slate-800 text-slate-300 active:scale-95">Cancel</button>
                                    <button onClick={() => {
                                        localStorage.removeItem(STORAGE_KEY);
                                        setOneRMs({ squat: 225, bench: 185, deadlift: 315, ohp: 135, rows: 155 });
                                        setHistory([]);
                                        setCurrentWeek(1);
                                        setPrograms([]);
                                        setHasOnboarded(false);
                                        setResetModal(false);
                                        setShowSettings(false);
                                        setOnboardingStep(1);
                                        setView('onboarding');
                                    }} className="flex-1 py-3 rounded-xl font-black text-[10px] uppercase tracking-widest bg-red-600 text-white active:scale-95 shadow-lg shadow-red-600/30">Wipe Data</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Global AI Floating Button */}
                    {!showAiChat && (
                        <button onClick={() => setShowAiChat(true)} className="fixed bottom-28 right-6 bg-indigo-600 w-14 h-14 rounded-full flex items-center justify-center shadow-[0_0_30px_rgba(79,70,229,0.8)] z-[300] border-2 border-indigo-400 active:scale-90 transition-transform">
                            <Icon name="sparkles" size={24} className="text-white" />
                        </button>
                    )}

                    <nav className="fixed bottom-0 left-0 right-0 bg-black/95 backdrop-blur-xl border-t border-slate-900 p-4 flex justify-around items-center pb-safe z-40 shadow-[0_-10px_40px_rgba(0,0,0,0.8)] px-8">
                        <button onClick={() => setView('home')} className={`flex flex-col items-center gap-1 transition-all active:scale-90 ${view === 'home' ? 'text-blue-500 drop-shadow-[0_0_8px_rgba(59,130,246,0.4)]' : 'text-slate-700'}`}>
                            <Icon name="dumbbell" size={22} />
                            <span className="text-[9px] font-black uppercase italic tracking-widest">Train</span>
                        </button>
                        <button onClick={() => setView('nutrition')} className={`flex flex-col items-center gap-1 transition-all active:scale-90 ${view === 'nutrition' ? 'text-green-500 drop-shadow-[0_0_8px_rgba(34,197,94,0.4)]' : 'text-slate-700'}`}>
                            <Icon name="refrigerator" size={22} />
                            <span className="text-[9px] font-black uppercase italic tracking-widest">Fuel</span>
                        </button>
                        <button onClick={() => setView('history')} className={`flex flex-col items-center gap-1 transition-all active:scale-90 ${view === 'history' ? 'text-blue-500 drop-shadow-[0_0_8px_rgba(59,130,246,0.4)]' : 'text-slate-700'}`}>
                            <Icon name="history" size={22} />
                            <span className="text-[9px] font-black uppercase italic tracking-widest">Intel</span>
                        </button>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
